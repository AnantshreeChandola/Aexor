name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Run Ruff lint
        run: ruff check .

      - name: Run Ruff format check
        run: ruff format --check .

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run mypy
        run: mypy components/ shared/ --strict || echo "Skipping mypy until components exist"

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=components \
            --cov=shared \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            -v || echo "Skipping tests until components exist"

  schema-validation:
    name: Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema

      - name: Validate shared schemas
        run: |
          python -c "
          import json
          from pathlib import Path
          from jsonschema import Draft7Validator

          schemas_dir = Path('shared/schemas')

          # Load all schemas
          schemas = {}
          for schema_file in schemas_dir.glob('*.schema.json'):
              with open(schema_file) as f:
                  schema = json.load(f)
                  schemas[schema_file.name] = schema

          # Validate each schema is valid JSON Schema Draft 7
          for name, schema in schemas.items():
              try:
                  Draft7Validator.check_schema(schema)
                  print(f'✓ {name} is valid JSON Schema Draft 7')
              except Exception as e:
                  print(f'✗ {name} validation failed: {e}')
                  exit(1)

          print(f'\\nAll {len(schemas)} schemas are valid!')
          "

  pr-checks:
    name: PR Requirements Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR has SPEC and LLD links
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"

          # Check for SPEC.md link
          if echo "$PR_BODY" | grep -q "components/.*SPEC\.md\|usecases/.*SPEC\.md"; then
            echo "✓ SPEC.md link found"
          else
            echo "⚠ PR should link to a SPEC.md file (skipping for now)"
          fi

          # Check for LLD.md link
          if echo "$PR_BODY" | grep -q "components/.*LLD\.md\|usecases/.*LLD\.md"; then
            echo "✓ LLD.md link found"
          else
            echo "⚠ PR should link to an LLD.md file (skipping for now)"
          fi

  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, schema-validation]
    if: always()
    steps:
      - name: Check if critical jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.schema-validation.result }}" != "success" ]]; then
            echo "✗ Critical checks failed"
            exit 1
          fi
          echo "✅ All critical checks passed!"
